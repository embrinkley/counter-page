<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
          content="width=device-width, 
                   initial-scale=1.0">
    <title>Animated Counter</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }

        #counter {
            font-size: 3rem;
            font-weight: bold;
            color: #4CAF50;
            margin-top: 20px;
        }
    </style>
</head>

<body>
  <div id="counter">0</div>

  <script>
    let upto = 36;
    let increase = 1;
    let counts = setInterval(updated, 1);

    function updated() {
        let count = document.getElementById("counter");
        count.innerHTML = upto += increase;
        if (upto === 36) {
            clearInterval(counts);
        }
    }
  </script>
</body>
</html>
